categories:
  - name: "Skin Care"
    keywords: ["barrier repair", "active ingredients", "ingredient analysis", "dermatology", "sunscreen filters", "glass skin", "cloud skin", "skin-minimalism", "ceramides", "peptides", "face wash", "moisturizer", "sunscreen", "serum"]
