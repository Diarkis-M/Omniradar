      - "https://news.google.com/rss/search?q=hair+style+trends+india+when:24h&hl=en-IN&gl=IN&ceid=IN:en"
      - "https://news.google.com/rss/search?q=site:pinterest.com+hairstyle+india+when:24h&hl=en-IN&gl=IN&ceid=IN:en"
      - "https://news.google.com/rss/search?q=hair+colour+india+when:24h&hl=en-IN&gl=IN&ceid=IN:en"

  - name: "Bath & Body"
    keywords: ["soap", "body wash", "shower gel", "handwash", "liquid soap", "bath essentials", "body lotion"]
    subreddits: ["IndianSkincareAddicts", "SkincareAddiction"]
    rss:
      - "https://news.google.com/rss/search?q=bath+body+soap+india+when:24h&hl=en-IN&gl=IN&ceid=IN:en"

  - name: "Men's Grooming"
    keywords: ["beard oil", "beard care", "shaving cream", "aftershave", "men's deodorant", "men's face wash", "men's grooming", "trimmer"]
