  - name: "Hair Care"
    keywords: ["scalp health", "hair porosity", "balayage", "hair serum", "butterfly cut", "wolf cut", "curtain bangs", "hair texture", "copper hair", "ash blonde", "hair colour", "henna", "mehendi"]
    subreddits: ["IndianHaircare", "HaircareScience", "Haircare", "curlyhair", "NoPoo"]
