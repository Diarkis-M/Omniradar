  - name: "Makeup"
    keywords: ["shade name", "lipstick shade", "eyeshadow palette", "finish", "matte", "dewy", "vinyl", "strawberry makeup", "soft goth", "sunset blush", "monochromatic", "warm tones", "cool tones"]
