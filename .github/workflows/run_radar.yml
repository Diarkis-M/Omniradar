name: Omniradar Pipeline

on:
  schedule:
    # 3 runs daily (IST = UTC + 5:30)
    - cron: '30 7 * * *'   # 1:00 PM IST — captures morning trends
    - cron: '30 12 * * *'  # 6:00 PM IST — captures afternoon trends
    - cron: '0 17 * * *'   # 10:30 PM IST — captures evening trends
  workflow_dispatch: # Manual trigger from GitHub UI anytime

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install chromium --with-deps

    - name: Run Pipeline
      env:
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Copy data to frontend
      run: cp daily_beauty_insights.json frontend/src/lib/pipeline_data.json

    - name: Commit & push
      run: |
        git config user.name 'github-actions'
        git config user.email 'github-actions@github.com'
        git add daily_beauty_insights.json frontend/src/lib/pipeline_data.json run_log.txt
        git diff --cached --quiet || git commit -m "Pipeline refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
        git pull --rebase origin main
        git push origin main
